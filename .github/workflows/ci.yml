name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: silafood/rust-cache-s3@v2
        with:
          shared-key: "runsteps"
          save-if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build
        run: cargo build --locked

      - name: Test
        run: cargo test --locked

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build artifacts
        uses: silafood/rust-cache-s3@v2
        with:
          shared-key: "runsteps"
          save-if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Clippy
        run: cargo clippy --locked -- -D warnings
